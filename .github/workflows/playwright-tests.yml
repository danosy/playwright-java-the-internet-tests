name: Playwright Java Automation CI (Gradle)

permissions:
  contents: write
  pages: write # Added permission for GitHub Pages deployment
  id-token: write # Added permission for GitHub Pages deployment

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} # Define environment for GitHub Pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 18
        uses: actions/setup-java@v4
        with:
          java-version: '18'
          distribution: 'corretto'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Install missing system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2t64 libgbm1 libnss3 libxss1 libasound2t64 libatk-bridge2.0-0 libgtk-3-0

      - name: Install Playwright browsers
        run: ./gradlew installPlaywrightBrowsers

      - name: Run Playwright Tests
        run: ./gradlew test --tests "tests.ui.*"

      - name: Debug artifacts
        if: always()
        run: |
          echo "=== Allure Results ==="
          ls -la build/allure-results/ || echo "No allure-results"
          echo "=== Screenshots ==="
          ls -la build/artifacts/screenshots/ || echo "No screenshots"

      - name: Generate Allure Report
        if: always()
        run: ./gradlew allureReport

      - name: Upload Allure Report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: build/reports/allure-report/allureReport/
          if-no-files-found: ignore

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: build/artifacts/
          if-no-files-found: ignore

      - name: Setup Pages
        uses: actions/configure-pages@v5
        id: pages

      - name: Publish Allure Report to GitHub Pages
        id: deployment # Added ID for output
        if: always()
        uses: actions/upload-pages-artifact@v3 # Changed to official GitHub Pages action
        with:
          path: build/reports/allure-report/allureReport # Path to your generated Allure report

      - name: Deploy to GitHub Pages
        id: deployment_pages # Added ID for output
        if: always()
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Print Allure Report URL
        if: always()
        run: |
          echo "Allure Report URL: ${{ steps.deployment_pages.outputs.page_url }}"
          echo "::notice::Allure Report URL: ${{ steps.deployment_pages.outputs.page_url }}"
